name: Publish Docker Images

on:
  push:
    branches:
      - main
      - feat/marvis-integration # Triggers when pushed to this branch
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (Optional)
        if: env.DOCKERHUB_USER != '' && env.DOCKERHUB_PASS != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sanitize branch name for Docker tag
        id: sanitize
        run: |
          REF_NAME="${{ github.ref_name }}"
          # Replace invalid characters (like '/') with '-' and convert to lowercase
          TAG_NAME=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9_.-]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Generate Image Tags
        id: tags
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG="${{ id.tag || steps.sanitize.outputs.tag }}"
          
          # Add GHCR tag
          TAGS="ghcr.io/${OWNER_LOWER}/multica-backend:${TAG}"
          if [ "${TAG}" = "main" ]; then
            TAGS="${TAGS},ghcr.io/${OWNER_LOWER}/multica-backend:latest"
          fi
          
          # Add Docker Hub tag if credentials are set
          if [ -n "${{ env.DOCKERHUB_USER }}" ]; then
            TAGS="${TAGS},${{ secrets.DOCKERHUB_USERNAME }}/multica-backend:${TAG}"
            if [ "${TAG}" = "main" ]; then
              TAGS="${TAGS},${{ secrets.DOCKERHUB_USERNAME }}/multica-backend:latest"
            fi
          fi
          
          echo "backend_tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}

  build-and-push-frontend:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (Optional)
        if: env.DOCKERHUB_USER != '' && env.DOCKERHUB_PASS != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sanitize branch name for Docker tag
        id: sanitize
        run: |
          REF_NAME="${{ github.ref_name }}"
          TAG_NAME=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9_.-]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Generate Image Tags
        id: tags
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG="${{ id.tag || steps.sanitize.outputs.tag }}"
          
          # Add GHCR tag
          TAGS="ghcr.io/${OWNER_LOWER}/multica-web:${TAG}"
          if [ "${TAG}" = "main" ]; then
            TAGS="${TAGS},ghcr.io/${OWNER_LOWER}/multica-web:latest"
          fi
          
          # Add Docker Hub tag if credentials are set
          if [ -n "${{ env.DOCKERHUB_USER }}" ]; then
            TAGS="${TAGS},${{ secrets.DOCKERHUB_USERNAME }}/multica-web:${TAG}"
            if [ "${TAG}" = "main" ]; then
              TAGS="${TAGS},${{ secrets.DOCKERHUB_USERNAME }}/multica-web:latest"
            fi
          fi
          
          echo "frontend_tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
